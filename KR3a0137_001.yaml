body:
  text: 陸子三皇垂策而五帝擊手唐虞按轡禹湯馳轅雖使周公御衡仲尼促節固不己也徐堅初學記卷九太平御覽卷七十六欲水之清則勿涉欲草之茂則勿獵太平御覽卷八百三十二鍾繇嘗數月不朝會意性異常或問其故云常有好婦來美麗非凡問者曰必是鬼物可殺之婦人後往不即前止戶外繇問何以曰公有相殺意繇曰無此乃勤勤呼之乃入繇意恨之有不忍之心然猶斫之傷髀婦人即出以新綿拭血竟路明日使人尋跡之至一大冢木中有好婦人形體如生人著白練衫丹繡裲襠傷左髀以裲襠中綿拭血雲嘗行逗宿故人家夜暗迷路莫知所從忽望草中有火光於是趣之至一家便寄宿見一年少美風姿共談老子辭致深遠向晚辭去行十許里至故人家云此數十里中無人居雲意始悟卻尋昨宿處乃王弼冢晉書陸雲傳
